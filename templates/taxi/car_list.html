{% extends "base.html" %}

{% block title %}Cars — Taxi Service{% endblock %}

{% block content %}
  <h1 class="mb-4">Cars</h1>
  <table class="table table-striped table-hover align-middle">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Model</th>
        <th>Manufacturer</th>
      </tr>
    </thead>
    <tbody>
      {% for car in car_list %}
        <tr>
          <td>
            <a href="{% url 'taxi:car-detail' car.pk %}">{{ car.pk }}</a>
          </td>
          <td>{{ car.model }}</td>
          <td>{{ car.manufacturer.name }}</td>
        </tr>
      {% empty %}
        <tr>
          <td colspan="3" class="text-center text-muted">
            No cars found.
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
